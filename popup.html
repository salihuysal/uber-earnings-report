<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uber Earnings Report</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --uber-black: #000000;
      --uber-white: #FFFFFF;
      --uber-gray-100: #F6F6F6;
      --uber-gray-200: #EEEEEE;
      --uber-gray-300: #E2E2E2;
      --uber-gray-500: #757575;
      --uber-gray-700: #333333;
      --uber-green: #00B37A;
      --uber-green-dark: #009966;
      --uber-red: #E11900;
      --uber-blue: #276EF1;
    }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 380px;
      min-height: 420px;
      background: var(--uber-white);
      color: var(--uber-black);
    }
    
    .header {
      background: linear-gradient(135deg, var(--uber-black) 0%, #1a1a1a 100%);
      color: var(--uber-white);
      padding: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: var(--uber-gray-300);
      font-weight: 400;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      background: var(--uber-white);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: auto;
      margin-right: auto;
    }
    
    .logo svg {
      width: 24px;
      height: 24px;
    }
    
    .content {
      padding: 16px;
    }
    
    .status-card {
      background: var(--uber-gray-100);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }
    
    .status-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--uber-gray-500);
    }
    
    .status-indicator.ready { background: var(--uber-green); box-shadow: 0 0 8px rgba(0, 179, 122, 0.5); }
    .status-indicator.error { background: var(--uber-red); }
    .status-indicator.running { background: var(--uber-blue); animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    .status-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--uber-gray-700);
    }
    
    .status-description {
      font-size: 12px;
      color: var(--uber-gray-500);
      line-height: 1.4;
    }
    
    /* Zeitraum-Auswahl */
    .periods-section {
      margin-bottom: 14px;
    }
    
    .periods-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .periods-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--uber-gray-700);
    }
    
    .periods-actions {
      display: flex;
      gap: 8px;
    }
    
    .periods-actions button {
      font-size: 11px;
      padding: 4px 8px;
      border: 1px solid var(--uber-gray-300);
      background: var(--uber-white);
      border-radius: 4px;
      cursor: pointer;
      color: var(--uber-gray-700);
    }
    
    .periods-actions button:hover {
      background: var(--uber-gray-100);
    }
    
    .periods-list {
      background: var(--uber-gray-100);
      border-radius: 10px;
      max-height: 180px;
      overflow-y: auto;
      padding: 8px;
    }
    
    .period-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .period-item:hover {
      background: var(--uber-gray-200);
    }
    
    .period-item input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--uber-green);
      cursor: pointer;
    }
    
    .period-item label {
      font-size: 12px;
      color: var(--uber-gray-700);
      cursor: pointer;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .period-item.disabled {
      opacity: 0.5;
    }
    
    .selected-count {
      font-size: 11px;
      color: var(--uber-gray-500);
      text-align: right;
      margin-top: 6px;
    }
    
    .btn {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: var(--uber-black);
      color: var(--uber-white);
    }
    
    .btn-primary:hover {
      background: #333;
      transform: translateY(-1px);
    }
    
    .btn-primary:disabled {
      background: var(--uber-gray-300);
      color: var(--uber-gray-500);
      cursor: not-allowed;
      transform: none;
    }
    
    .btn-danger {
      background: var(--uber-red);
      color: var(--uber-white);
      margin-top: 10px;
    }
    
    .btn svg {
      width: 18px;
      height: 18px;
    }
    
    .progress-section {
      display: none;
      margin-top: 14px;
    }
    
    .progress-section.active {
      display: block;
    }
    
    .progress-bar {
      height: 6px;
      background: var(--uber-gray-200);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: var(--uber-green);
      width: 0%;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 11px;
      color: var(--uber-gray-500);
      margin-top: 8px;
      text-align: center;
    }
    
    .log-container {
      max-height: 100px;
      overflow-y: auto;
      background: var(--uber-gray-100);
      border-radius: 8px;
      padding: 10px;
      margin-top: 12px;
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 10px;
      color: var(--uber-gray-700);
    }
    
    .log-entry {
      padding: 2px 0;
      border-bottom: 1px solid var(--uber-gray-200);
    }
    
    .log-entry:last-child { border-bottom: none; }
    .log-entry.success { color: var(--uber-green-dark); }
    .log-entry.error { color: var(--uber-red); }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: var(--uber-gray-500);
      border-top: 1px solid var(--uber-gray-200);
    }
    
    .hidden { display: none !important; }
    
    /* Driver Filter Styles */
    .driver-filter-section {
      margin-bottom: 14px;
      background: var(--uber-gray-100);
      border-radius: 10px;
      padding: 12px;
    }
    
    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .filter-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--uber-gray-700);
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    
    .toggle-container input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--uber-green);
    }
    
    .toggle-label {
      font-size: 11px;
      color: var(--uber-gray-500);
    }
    
    .filter-content {
      margin-top: 10px;
    }
    
    .filter-input-container {
      margin-bottom: 8px;
    }
    
    .filter-input-container input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--uber-gray-300);
      border-radius: 6px;
      font-size: 12px;
      background: var(--uber-white);
    }
    
    .filter-input-container input:focus {
      outline: none;
      border-color: var(--uber-green);
    }
    
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 24px;
    }
    
    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--uber-black);
      color: var(--uber-white);
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    
    .filter-tag:hover {
      background: var(--uber-red);
    }
    
    .filter-tag::after {
      content: '×';
      font-size: 13px;
      font-weight: bold;
    }
    
    .filter-hint {
      font-size: 10px;
      color: var(--uber-gray-500);
      margin-top: 6px;
    }
    
    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--uber-gray-300);
      border-top-color: var(--uber-black);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto;
    }
    
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="black"/>
      </svg>
    </div>
    <h1>Uber Earnings Report</h1>
    <p>Automatischer CSV-Export</p>
  </div>
  
  <div class="content">
    <div class="status-card">
      <div class="status-header">
        <div class="status-indicator" id="statusIndicator"></div>
        <span class="status-text" id="statusText">Wird geladen...</span>
      </div>
      <p class="status-description" id="statusDescription">
        Verbindung zur Uber-Seite wird überprüft...
      </p>
    </div>
    
    <!-- Zeitraum-Auswahl -->
    <div class="periods-section" id="periodsSection">
      <div class="periods-header">
        <span class="periods-title">📅 Zeiträume auswählen</span>
        <div class="periods-actions">
          <button id="selectAllBtn">Alle</button>
          <button id="selectNoneBtn">Keine</button>
        </div>
      </div>
      <div class="periods-list" id="periodsList">
        <div class="loading-spinner"></div>
      </div>
      <p class="selected-count" id="selectedCount">Lade Zeiträume...</p>
    </div>
    
    <!-- Developer Filter für Fahrer -->
    <div class="driver-filter-section" id="driverFilterSection">
      <div class="filter-header">
        <span class="filter-title">👤 Fahrer-Filter (optional)</span>
        <label class="toggle-container">
          <input type="checkbox" id="filterToggle">
          <span class="toggle-label">Aktivieren</span>
        </label>
      </div>
      <div class="filter-content hidden" id="filterContent">
        <div class="filter-input-container">
          <input type="text" id="driverFilterInput" placeholder="Name eingeben, ; zum Hinzufügen">
        </div>
        <div class="filter-tags" id="filterTags"></div>
        <p class="filter-hint">Nur diese Fahrer werden verarbeitet (case insensitive)</p>
      </div>
    </div>
    
    <button class="btn btn-primary" id="startBtn" disabled>
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
      Report generieren
    </button>
    
    <button class="btn btn-danger hidden" id="stopBtn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12"/>
      </svg>
      Abbrechen
    </button>
    
    <div class="progress-section" id="progressSection">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="progress-text" id="progressText">Starte...</p>
    </div>
    
    <div class="log-container hidden" id="logContainer"></div>
  </div>
  
  <div class="footer">
    v2.0 • Daten werden lokal verarbeitet
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
